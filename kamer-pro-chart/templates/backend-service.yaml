apiVersion: v1
kind: Service
metadata:
  name: {{ include "kamer-pro-chart.fullname" . }}-backend
  labels:
    {{- include "kamer-pro-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kamer-pro-chart.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kamerlink.fullname" . }}-backend-config
  labels:
    {{- include "kamerlink.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  DATABASE_URL: {{ .Values.backend.env.DATABASE_URL | quote }}
  RUST_LOG: {{ .Values.backend.env.RUST_LOG | quote }}
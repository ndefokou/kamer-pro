# Default values for kamerlink
# This is a YAML-formatted file.

# Backend configuration
backend:
  name: backend
  replicaCount: 1  # SQLite doesn't support multiple replicas without shared storage
  
  image:
    repository: kamer-pro-backend
    pullPolicy: Never
    tag: "latest"
  
  imagePullSecrets: []
  
  service:
    type: ClusterIP
    port: 8082
    targetPort: 8082
  
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi
  
  env:
    # This will be populated from the postgresql secret
    # DATABASE_URL: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql/{{ .Values.postgresql.auth.database }}"
    RUST_LOG: "info"
    STORAGE_TYPE: "s3"
    S3_BUCKET: "kamerlink-uploads"
  
  # Persistent volume for SQLite database
  persistence:
    enabled: false # Disabled in favor of PostgreSQL
  
  # Persistent volume for uploaded files
  uploads:
    enabled: false # Disabled in favor of S3
  
  livenessProbe:
    httpGet:
      path: /api/products
      port: 8082
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /api/products
      port: 8082
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Frontend configuration
frontend:
  name: frontend
  replicaCount: 2
  
  image:
    repository: kamer-pro-frontend
    pullPolicy: Never
    tag: "latest"
              
  imagePullSecrets: []
  
  service:
    type: LoadBalancer
    port: 80
    targetPort: 80  # ✅ Changed from 5173 to 80 (nginx default port)
  
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  env:
    PROXY_URL: "http://{{ .Release.Name }}-backend:8082"
  
  livenessProbe:
    httpGet:
      path: /
      port: 80  # ✅ Changed from 5173 to 80
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
  
  readinessProbe:
    httpGet:
      path: /
      port: 80  # ✅ Changed from 5173 to 80
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 2

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
          service:
            name: frontend
            port: 80
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# PostgreSQL configuration
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "13"
  auth:
    username: kamerlink
    password: "changeme"
    database: kamerlink
  persistence:
    enabled: true
    storageClass: "standard"
    size: 8Gi

# Service Account configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""